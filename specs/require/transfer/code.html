<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transfer - Serenity Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f7f9fb",
                        "on-primary-fixed": "#100563",
                        "on-primary-container": "#9c9af4",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#474651",
                        "surface-bright": "#f7f9fb",
                        "primary": "#1a146b",
                        "secondary-fixed-dim": "#68dba9",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#920028",
                        "surface": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#5654a8",
                        "on-error": "#ffffff",
                        "primary-container": "#312e81",
                        "on-tertiary-container": "#ff7a85",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#790020",
                        "error": "#ba1a1a",
                        "on-surface": "#191c1e",
                        "surface-container": "#eceef0",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3e3c8f",
                        "tertiary": "#500012",
                        "on-secondary-fixed-variant": "#005137",
                        "outline-variant": "#c8c5d3",
                        "primary-fixed-dim": "#c3c0ff",
                        "tertiary-fixed-dim": "#ffb3b6",
                        "inverse-primary": "#c3c0ff",
                        "primary-fixed": "#e2dfff",
                        "inverse-surface": "#2d3133",
                        "secondary-container": "#82f5c1",
                        "outline": "#777682",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed": "#ffdada",
                        "on-secondary-container": "#00714e",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed": "#85f8c4",
                        "secondary": "#006c4a",
                        "surface-container-high": "#e6e8ea",
                        "on-background": "#191c1e",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed": "#002114",
                        "on-tertiary-fixed": "#40000c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "xl": "32px",
                        "base": "4px",
                        "md": "16px",
                        "xs": "4px",
                        "lg": "24px",
                        "margin-mobile": "20px",
                        "gutter-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "display": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "body-sm": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        /* Hide scrollbar for clean inputs */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md flex flex-col min-h-screen pb-safe antialiased">
<!-- Header (Task-Focused, Suppressed Global Nav) -->
<header class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-7xl mx-auto z-50">
<button class="w-10 h-10 flex items-center justify-center -ml-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 text-on-background">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-h2 text-h2 text-on-background">Transfer</h1>
<div class="w-10 h-10 flex items-center justify-center -mr-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 text-outline">
<span class="material-symbols-outlined">help</span>
</div>
</header>
<main class="flex-1 px-margin-mobile flex flex-col gap-xl mt-sm max-w-3xl mx-auto w-full">
<!-- Central Amount Input -->
<div class="flex flex-col items-center justify-center py-lg">
<span class="font-label-md text-label-md text-outline tracking-wider uppercase mb-sm">Amount</span>
<div class="flex flex-row items-center justify-center bg-transparent relative">
<span class="font-display text-display text-primary mr-1">$</span>
<input class="font-display text-display text-primary bg-transparent border-none p-0 w-32 focus:ring-0 text-center placeholder:text-primary-fixed-dim outline-none" placeholder="0.00" type="number" value="500.00"/>
</div>
<div class="h-1 w-16 bg-primary-fixed-dim rounded-full mt-sm opacity-50"></div>
</div>
<!-- Directional Flow: From / To Selectors -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] p-xs relative flex flex-col">
<!-- From Account -->
<button class="w-full flex items-center justify-between p-md rounded-lg hover:bg-surface-container-low transition-colors group text-left active:scale-[0.99]">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div>
<p class="font-label-md text-label-md text-outline mb-xs">From</p>
<p class="font-body-lg text-body-lg text-on-background">Main Checking</p>
</div>
</div>
<div class="flex items-center gap-sm text-right">
<div class="hidden sm:block">
<p class="font-body-sm text-body-sm text-on-surface-variant">Available</p>
<p class="font-label-md text-label-md text-on-background">$4,250.00</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">expand_more</span>
</div>
</button>
<!-- Divider & Directional Icon -->
<div class="relative py-xs flex justify-center">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container-highest mx-xl"></div>
</div>
<div class="relative w-8 h-8 rounded-full bg-surface-container-lowest border-2 border-surface-container-lowest flex items-center justify-center text-on-primary-container bg-primary-container z-10 shadow-sm">
<span class="material-symbols-outlined text-[16px]">arrow_downward</span>
</div>
</div>
<!-- To Account -->
<button class="w-full flex items-center justify-between p-md rounded-lg hover:bg-surface-container-low transition-colors group text-left active:scale-[0.99]">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-secondary group-hover:bg-secondary-fixed transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">savings</span>
</div>
<div>
<p class="font-label-md text-label-md text-outline mb-xs">To</p>
<p class="font-body-lg text-body-lg text-on-background">Vacation Savings</p>
</div>
</div>
<div class="flex items-center gap-sm text-right">
<div class="hidden sm:block">
<p class="font-body-sm text-body-sm text-on-surface-variant">Current</p>
<p class="font-label-md text-label-md text-on-background">$12,000.00</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-secondary transition-colors">expand_more</span>
</div>
</button>
</div>
<!-- Details Form (Date & Note) -->
<div class="flex flex-col gap-md mt-sm">
<!-- Date Field -->
<div class="relative">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs block ml-xs">Date</label>
<div class="group relative flex items-center bg-surface-container-highest rounded-lg px-md h-14 border-2 border-transparent focus-within:bg-surface-container-lowest focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline mr-sm group-focus-within:text-primary transition-colors">calendar_today</span>
<input class="w-full bg-transparent border-none outline-none font-body-md text-body-md text-on-background p-0 focus:ring-0" type="text" value="Today, Oct 24"/>
</div>
</div>
<!-- Note Field -->
<div class="relative">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs block ml-xs">Note (Optional)</label>
<div class="group relative flex items-center bg-surface-container-highest rounded-lg px-md h-14 border-2 border-transparent focus-within:bg-surface-container-lowest focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline mr-sm group-focus-within:text-primary transition-colors">edit_note</span>
<input class="w-full bg-transparent border-none outline-none font-body-md text-body-md text-on-background p-0 focus:ring-0 placeholder:text-outline-variant" placeholder="What is this transfer for?" type="text"/>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom Action -->
<div class="p-margin-mobile pt-lg mt-auto w-full max-w-3xl mx-auto">
<button class="w-full bg-primary text-on-primary font-label-caps text-label-caps h-14 rounded-full flex items-center justify-center gap-sm shadow-[0_8px_24px_rgba(26,20,107,0.15)] hover:bg-primary-container hover:shadow-[0_12px_32px_rgba(26,20,107,0.2)] active:scale-[0.98] transition-all duration-300 group">
<span>Confirm Transfer</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</body></html>
