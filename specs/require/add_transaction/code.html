<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Transaction - Serenity Finance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f7f9fb",
                        "on-primary-fixed": "#100563",
                        "on-primary-container": "#9c9af4",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#474651",
                        "surface-bright": "#f7f9fb",
                        "primary": "#1a146b",
                        "secondary-fixed-dim": "#68dba9",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#920028",
                        "surface": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#5654a8",
                        "on-error": "#ffffff",
                        "primary-container": "#312e81",
                        "on-tertiary-container": "#ff7a85",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#790020",
                        "error": "#ba1a1a",
                        "on-surface": "#191c1e",
                        "surface-container": "#eceef0",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3e3c8f",
                        "tertiary": "#500012",
                        "on-secondary-fixed-variant": "#005137",
                        "outline-variant": "#c8c5d3",
                        "primary-fixed-dim": "#c3c0ff",
                        "tertiary-fixed-dim": "#ffb3b6",
                        "inverse-primary": "#c3c0ff",
                        "primary-fixed": "#e2dfff",
                        "inverse-surface": "#2d3133",
                        "secondary-container": "#82f5c1",
                        "outline": "#777682",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed": "#ffdada",
                        "on-secondary-container": "#00714e",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed": "#85f8c4",
                        "secondary": "#006c4a",
                        "surface-container-high": "#e6e8ea",
                        "on-background": "#191c1e",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed": "#002114",
                        "on-tertiary-fixed": "#40000c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "xl": "32px",
                        "base": "4px",
                        "md": "16px",
                        "xs": "4px",
                        "lg": "24px",
                        "margin-mobile": "20px",
                        "gutter-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "display": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "body-sm": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col relative antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Header -->
<header class="flex items-center justify-between px-margin-mobile h-16 sticky top-0 z-30 bg-background/90 backdrop-blur-md">
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors -ml-2">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="font-h2 text-h2 text-on-surface">New Transaction</h1>
<div class="w-10"></div> <!-- Spacer for optical centering -->
</header>
<!-- Main Scrollable Content -->
<main class="flex-1 overflow-y-auto px-margin-mobile pb-[120px] flex flex-col gap-lg pt-2">
<!-- Type Toggle Segmented Control -->
<div class="flex p-1 bg-surface-container rounded-full w-full max-w-sm mx-auto shadow-inner">
<button class="flex-1 py-2 rounded-full bg-surface-container-lowest text-on-surface shadow-[0_2px_8px_rgba(0,0,0,0.04)] font-label-md text-label-md transition-all">Expense</button>
<button class="flex-1 py-2 rounded-full text-on-surface-variant font-label-md text-label-md hover:text-on-surface transition-all">Income</button>
<button class="flex-1 py-2 rounded-full text-on-surface-variant font-label-md text-label-md hover:text-on-surface transition-all">Transfer</button>
</div>
<!-- Large Amount Input -->
<div class="flex flex-col items-center justify-center py-4">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 uppercase">Amount</label>
<div class="flex items-center justify-center relative w-full max-w-xs">
<span class="font-display text-display text-on-surface-variant absolute left-4">$</span>
<input autofocus="" class="w-full text-center font-display text-[48px] leading-[56px] font-bold text-on-surface bg-transparent border-0 border-transparent p-0 focus:ring-0 placeholder-on-surface-variant/30" placeholder="0.00" type="number" value=""/>
</div>
</div>
<!-- Grouped Selectors (Bento Card Style) -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.02)] p-2 flex flex-col">
<!-- Category -->
<button class="flex items-center justify-between p-md hover:bg-surface-container transition-colors rounded-lg group text-left">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-tertiary-container/20 flex items-center justify-center group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-tertiary-container" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<div class="flex flex-col items-start">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Category</span>
<span class="font-body-md text-body-md text-on-surface mt-0.5">Food &amp; Dining</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors">chevron_right</span>
</button>
<!-- Internal Divider -->
<div class="h-px w-[calc(100%-16px)] mx-auto bg-surface-container-highest my-1"></div>
<!-- Account -->
<button class="flex items-center justify-between p-md hover:bg-surface-container transition-colors rounded-lg group text-left">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-secondary-container/20 flex items-center justify-center group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-secondary-container" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div class="flex flex-col items-start">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Account</span>
<span class="font-body-md text-body-md text-on-surface mt-0.5">Checking ...4092</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors">chevron_right</span>
</button>
<!-- Internal Divider -->
<div class="h-px w-[calc(100%-16px)] mx-auto bg-surface-container-highest my-1"></div>
<!-- Date -->
<button class="flex items-center justify-between p-md hover:bg-surface-container transition-colors rounded-lg group text-left">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
<div class="flex flex-col items-start">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Date &amp; Time</span>
<span class="font-body-md text-body-md text-on-surface mt-0.5">Today, 2:30 PM</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors">chevron_right</span>
</button>
</div>
<!-- Note Field -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1 uppercase">Note</label>
<textarea class="w-full bg-surface-container-low border-0 rounded-xl p-md font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all resize-none shadow-sm" placeholder="What was this for?" rows="2"></textarea>
</div>
<!-- Recurring Toggle Card -->
<div class="flex items-center justify-between p-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">update</span>
</div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface font-medium">Recurring</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Repeat this transaction</span>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</main>
<!-- Pinned Save Button -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background via-background/90 to-transparent pt-12 pb-8 px-margin-mobile z-40 backdrop-blur-[2px]">
<button class="w-full bg-primary text-on-primary font-body-lg text-body-lg font-medium py-4 rounded-xl shadow-[0_8px_24px_rgba(26,20,107,0.25)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span>Save Transaction</span>
</button>
</div>
</body></html>
