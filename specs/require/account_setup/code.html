<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Account Setup - Serenity Finance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#f7f9fb",
                        "on-primary-fixed": "#100563",
                        "on-primary-container": "#9c9af4",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#474651",
                        "surface-bright": "#f7f9fb",
                        "primary": "#1a146b",
                        "secondary-fixed-dim": "#68dba9",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#920028",
                        "surface": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#5654a8",
                        "on-error": "#ffffff",
                        "primary-container": "#312e81",
                        "on-tertiary-container": "#ff7a85",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#790020",
                        "error": "#ba1a1a",
                        "on-surface": "#191c1e",
                        "surface-container": "#eceef0",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3e3c8f",
                        "tertiary": "#500012",
                        "on-secondary-fixed-variant": "#005137",
                        "outline-variant": "#c8c5d3",
                        "primary-fixed-dim": "#c3c0ff",
                        "tertiary-fixed-dim": "#ffb3b6",
                        "inverse-primary": "#c3c0ff",
                        "primary-fixed": "#e2dfff",
                        "inverse-surface": "#2d3133",
                        "secondary-container": "#82f5c1",
                        "outline": "#777682",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed": "#ffdada",
                        "on-secondary-container": "#00714e",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed": "#85f8c4",
                        "secondary": "#006c4a",
                        "surface-container-high": "#e6e8ea",
                        "on-background": "#191c1e",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed": "#002114",
                        "on-tertiary-fixed": "#40000c"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem"
                    },
                    spacing: {
                        "sm": "8px",
                        "xl": "32px",
                        "base": "4px",
                        "md": "16px",
                        "xs": "4px",
                        "lg": "24px",
                        "margin-mobile": "20px",
                        "gutter-mobile": "16px"
                    },
                    fontFamily: {
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "display": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "body-sm": ["Inter"],
                        "h1": ["Inter"]
                    },
                    fontSize: {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Hide scrollbar for clean UI but allow scrolling */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom form input resets for Design System compliance */
        input[type="text"], input[type="number"], input[type="tel"] {
            box-shadow: none !important;
        }
        
        /* Smooth selection color */
        ::selection {
            background-color: #e2dfff; /* primary-fixed */
            color: #100563; /* on-primary-fixed */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-body-md text-on-background antialiased relative">
<!-- Transactional Flow Header (Suppressing standard App Bar per rules) -->
<header class="flex items-center justify-between px-margin-mobile h-16 shrink-0 w-full max-w-2xl mx-auto">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">arrow_back</span>
</button>
<div class="flex gap-1 items-center">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-high"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-high"></div>
</div>
<div class="w-10"></div> <!-- Balancer for flex-between -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile pt-md pb-[120px] w-full max-w-2xl mx-auto overflow-y-auto">
<!-- Hero Section -->
<div class="mb-xl px-sm">
<h1 class="font-display text-display text-primary mb-sm tracking-tight">Add Account</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Let's get your finances organized. Enter your starting balance to begin tracking.</p>
</div>
<!-- Form Elements -->
<div class="flex flex-col gap-lg px-sm">
<!-- Account Name Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="accountName">Account Name</label>
<div class="relative group">
<input class="w-full h-[56px] bg-surface-container-low rounded-xl px-md font-body-lg text-body-lg text-on-background placeholder:text-outline/60 border-transparent focus:border-transparent focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[inset_0_0_0_2px_#1a146b] transition-all duration-200 outline-none" id="accountName" placeholder="e.g., Main Checking" type="text"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-primary transition-colors pointer-events-none">edit_square</span>
</div>
</div>
<!-- Currency & Balance Row -->
<div class="flex gap-md">
<!-- Currency Selector (Simulated Dropdown) -->
<div class="flex flex-col gap-sm w-[110px] shrink-0">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Currency</label>
<button class="w-full h-[56px] bg-surface-container-low rounded-xl px-4 flex items-center justify-between outline-none focus:bg-surface-container-lowest focus:shadow-[inset_0_0_0_2px_#1a146b] transition-all group active:scale-95">
<span class="font-body-lg text-body-lg text-on-background font-medium">USD</span>
<span class="material-symbols-outlined text-outline group-focus:text-primary transition-colors">keyboard_arrow_down</span>
</button>
</div>
<!-- Starting Balance Input -->
<div class="flex flex-col gap-sm flex-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="startingBalance">Starting Balance</label>
<div class="relative flex items-center h-[56px] group">
<span class="absolute left-md font-h1 text-h1 text-on-background pointer-events-none group-focus-within:text-primary transition-colors">$</span>
<input class="w-full h-full bg-surface-container-low rounded-xl pl-[36px] pr-md font-h1 text-h1 text-on-background placeholder:text-outline/40 border-transparent focus:border-transparent focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[inset_0_0_0_2px_#1a146b] transition-all duration-200 outline-none" id="startingBalance" inputmode="decimal" placeholder="0.00" type="text"/>
</div>
</div>
</div>
<!-- Optional: Account Type Chips (Bento-style enhancement) -->
<div class="flex flex-col gap-sm mt-md">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Account Type</label>
<div class="grid grid-cols-3 gap-sm">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="accType" type="radio"/>
<div class="h-12 flex items-center justify-center rounded-lg bg-surface-container-low border-2 border-transparent peer-checked:bg-primary-fixed peer-checked:border-primary-fixed-dim peer-checked:text-on-primary-fixed text-on-surface-variant transition-all font-label-md text-label-md font-medium">
                            Checking
                        </div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="accType" type="radio"/>
<div class="h-12 flex items-center justify-center rounded-lg bg-surface-container-low border-2 border-transparent peer-checked:bg-primary-fixed peer-checked:border-primary-fixed-dim peer-checked:text-on-primary-fixed text-on-surface-variant transition-all font-label-md text-label-md font-medium">
                            Savings
                        </div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="accType" type="radio"/>
<div class="h-12 flex items-center justify-center rounded-lg bg-surface-container-low border-2 border-transparent peer-checked:bg-primary-fixed peer-checked:border-primary-fixed-dim peer-checked:text-on-primary-fixed text-on-surface-variant transition-all font-label-md text-label-md font-medium">
                            Credit
                        </div>
</label>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Action Area (Easy one-hand entry) -->
<div class="fixed bottom-0 left-0 w-full px-margin-mobile pb-[calc(24px+env(safe-area-inset-bottom))] pt-lg bg-gradient-to-t from-background via-background/95 to-transparent pointer-events-none flex justify-center z-50">
<div class="w-full max-w-2xl pointer-events-auto">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-h2 text-h2 flex items-center justify-center gap-2 shadow-[0_8px_24px_rgba(26,20,107,0.15)] active:scale-[0.98] transition-all hover:bg-primary/90">
<span>Continue</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
</div>
</div>
</body></html>
